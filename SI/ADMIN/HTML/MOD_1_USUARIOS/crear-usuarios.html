<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear usuarios</title>
    <link rel="stylesheet" href="../../CSS/estilos-crear-usuario.css">
</head>
<body>
    <div class="contenedor-form"> <nav>
            <a href="../MOD_3/principal.html">Principal</a> / 
            <a>Registrar Usuarios</a> / 
            <a href="crear-usuarios.html">Crear usuarios</a>
        </nav>
        
        <main>
            <h1 class="titulo-seccion">Crear Usuarios</h1>
            
            <form action="../MOD_3/index-admin.html" method="get">
                <div class="form-comp">
                    
                    <div class="form-doble borde-izq">
                        <div class="form-cuerpo">
                            <div>
                                <label for="nombre">Nombres</label>
                                <input type="text" name="nombre" id="nombre" placeholder="Nombre completo" required>
                            </div>
                            <div>
                                <label for="apellidos">Apellidos</label>
                                <input type="text" name="apellidos" id="apellidos" placeholder="Apellidos paternos y maternos" required>
                            </div>
                            <div>
                                <label for="correo">Correo</label>
                                <input type="email" name="correo" id="correo" placeholder="correo@ejemplo.com" required>
                            </div>
                            <div>
                                <label for="contrasena">Contraseña</label>
                                <input type="password" name="contrasena" id="contrasena" placeholder="Entre 5 y 8 caracteres" required minlength="5" maxlength="8">
                            </div>
                            <div>
                                <label for="rep-contrasena">Repetir contraseña</label>
                                <input type="password" name="rep-contrasena" id="rep-contrasena" placeholder="Confirmar contraseña" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-doble">
                        <div class="form-cuerpo">
                            <div class="tipo-radio">
                                <label>Sexo</label>
                                <input type="radio" name="gender" value="male" checked> Hombre
                                <input type="radio" name="gender" value="female"> Mujer
                                <input type="radio" name="gender" value="other"> Otro
                            </div>
                            <div>
                                <label for="fecha-ingreso">Fecha Ingreso</label>
                                <input type="date" name="fecha-ingreso" id="fecha-ingreso" required>
                            </div>
                            <div>
                                <label for="profesion">Profesión</label>
                                <select name="profesion" id="profesion">
                                    <option value="estudiante">Estudiante</option>
                                    <option value="ingeniero">Ingeniero</option>
                                    <option value="licenciado">Licenciado</option>
                                </select>
                            </div>
                            <div>
                                <label for="tipo-usuario">Tipo Usuario</label>
                                <select name="tipo-usuario" id="tipo-usuario">
                                    <option value="cliente">Cliente</option>
                                    <option value="empleado">Empleado</option>
                                    <option value="proveedor">Proveedor</option>
                                    <option value="admin">Administrador</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-pie">
                            <button type="submit" class="btn-enviar">Enviar</button>
                            <a href="../MOD_3/principal.html" class="btn-cancel">Cancelar</a>
                        </div>
                    </div>
                </div>
            </form>
        </main>
    </div>
</body>
</html>
